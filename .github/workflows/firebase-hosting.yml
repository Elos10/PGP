name: Deploy Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Firebase secrets
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
        run: |
          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "::error::Configure o secret FIREBASE_PROJECT_ID com o ID do projeto Firebase."
            exit 1
          fi

          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::Configure o secret FIREBASE_SERVICE_ACCOUNT com o JSON completo da service account do Firebase."
            exit 1
          fi

          if [ -z "$FIREBASE_API_KEY" ] || [ -z "$FIREBASE_APP_ID" ] || [ -z "$FIREBASE_MESSAGING_SENDER_ID" ]; then
            echo "::error::Configure FIREBASE_API_KEY, FIREBASE_APP_ID e FIREBASE_MESSAGING_SENDER_ID com os dados do app web Firebase."
            exit 1
          fi

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Create Firebase web config
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
        run: |
          cat > firebase-config.js <<EOF
          window.PGP_FIREBASE_CONFIG = {
            apiKey: "$FIREBASE_API_KEY",
            authDomain: "$FIREBASE_PROJECT_ID.firebaseapp.com",
            projectId: "$FIREBASE_PROJECT_ID",
            storageBucket: "$FIREBASE_PROJECT_ID.firebasestorage.app",
            messagingSenderId: "$FIREBASE_MESSAGING_SENDER_ID",
            appId: "$FIREBASE_APP_ID"
          };

          window.PGP_FIREBASE_OPTIONS = {
            collection: "pgp",
            documentId: "estado-principal"
          };
          EOF

      - name: Deploy Hosting and Firestore
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-service-account.json"
          firebase deploy --only hosting,firestore:rules,firestore:indexes --project "$FIREBASE_PROJECT_ID" --non-interactive
